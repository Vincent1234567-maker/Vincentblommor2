<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blomklassificering</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      max-width: 750px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #2e7d32;
      margin-bottom: 25px;
    }

    .status-box {
      background: #eef7ee;
      border-left: 5px solid #43a047;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 25px;
      font-weight: bold;
    }

    .upload-section {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="file"] {
      padding: 10px;
    }

    img {
      display: none;
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid #ddd;
      margin-top: 20px;
    }

    .result-box {
      margin-top: 25px;
      padding: 20px;
      background: #f7f7f7;
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.7;
    }

    .success {
      color: #2e7d32;
      font-weight: bold;
    }

    .warning {
      color: #d84315;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- BYT TILL DITT NAMN -->
    <h1>Ditt Namn, TE23</h1>

    <div class="status-box" id="status">
      Laddar modell...
    </div>

    <div class="upload-section">
      <input type="file" id="imageInput" accept="image/*">
    </div>

    <img id="previewImage">

    <div class="result-box" id="result">
      Ladda upp en blom-bild för att börja.
    </div>

  </div>

  <script>
    let model;

    // ÄNDRA ordningen så den matchar modellen
    const classNames = [
      "Lavendel",
      "Maskros",
      "Ros",
      "Solros",
      "Tulpan"
    ];

    const statusBox = document.getElementById("status");
    const imageInput = document.getElementById("imageInput");
    const previewImage = document.getElementById("previewImage");
    const resultBox = document.getElementById("result");

    // =========================
    // LADDA MODELL
    // =========================
    async function loadModel() {

      try {

        statusBox.textContent = "Laddar modell...";

        model = await tf.loadLayersModel(
          "tfjs_model/model.json"
        );

        statusBox.innerHTML =
          "<span class='success'>Modellen är klar!</span>";

        console.log("Modellen laddad!");

      } catch (error) {

        console.error(error);

        statusBox.innerHTML =
          "<span class='warning'>Fel vid laddning av modell.</span>";
      }
    }

    loadModel();

    // =========================
    // LADDA BILD
    // =========================
    imageInput.addEventListener("change", (event) => {

      const file = event.target.files[0];

      if (!file) return;

      const imageURL = URL.createObjectURL(file);

      previewImage.src = imageURL;
      previewImage.style.display = "block";

      previewImage.onload = async () => {
        await classifyImage(previewImage);
      };
    });

    // =========================
    // FÖRBEHANDLA BILD
    // =========================
    function preprocessImage(image) {

      return tf.tidy(() => {

        return tf.browser
          .fromPixels(image)
          .resizeBilinear([224, 224])
          .toFloat()
          .div(255.0)
          .expandDims(0);
      });
    }

    // =========================
    // SOFTMAX-FUNKTION
    // =========================
    function softmax(arr) {

      const max = Math.max(...arr);

      const exps = arr.map(x => Math.exp(x - max));

      const sum = exps.reduce((a, b) => a + b);

      return exps.map(v => v / sum);
    }

    // =========================
    // KLASSIFICERA BILD
    // =========================
    async function classifyImage(image) {

      try {

        resultBox.innerHTML = "Analyserar bild...";

        const tensor = preprocessImage(image);

        // Modell-prediktion
        const prediction = model.predict(tensor);

        // Hämta rådata
        const rawData = await prediction.data();

        console.log("Rå modell-output:", rawData);

        // =========================
        // VIKTIG FIX:
        // Om modellen INTE använder softmax
        // får man värden över 1.
        // Därför normaliserar vi med softmax här.
        // =========================
        const probabilities = softmax(Array.from(rawData));

        console.log("Softmax:", probabilities);

        // Hitta högsta sannolikhet
        let highestProbability = 0;
        let highestIndex = 0;

        for (let i = 0; i < probabilities.length; i++) {

          if (probabilities[i] > highestProbability) {

            highestProbability = probabilities[i];
            highestIndex = i;
          }
        }

        const flowerName =
          classNames[highestIndex] || "Okänd blomma";

        const percent =
          (highestProbability * 100).toFixed(2);

        // =========================
        // OSÄKERHETSLOGIK
        // =========================
        let confidenceMessage = "";

        if (highestProbability < 0.5) {

          confidenceMessage =
            "<div class='warning'>Mycket osäkert resultat</div>";

        } else if (highestProbability < 0.75) {

          confidenceMessage =
            "<div class='warning'>Osäkert resultat</div>";
        }

        // =========================
        // VISA RESULTAT
        // =========================
        resultBox.innerHTML = `
          <strong>Blomart:</strong> ${flowerName}<br>
          <strong>Sannolikhet:</strong> ${percent}%<br><br>
          ${confidenceMessage}
        `;

        // Rensa minne
        tensor.dispose();
        prediction.dispose();

      } catch (error) {

        console.error(error);

        resultBox.innerHTML =
          "<span class='warning'>Fel vid klassificering av bild.</span>";
      }
    }
  </script>

</body>
</html>
