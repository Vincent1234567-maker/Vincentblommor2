<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blomklassificering</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:30px;
      background:#f3f5f7;
      font-family:Arial, sans-serif;
      color:#222;
    }

    .container{
      max-width:800px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      color:#2e7d32;
      margin-bottom:25px;
    }

    .status{
      padding:15px;
      border-radius:12px;
      margin-bottom:25px;
      background:#eef7ee;
      border-left:5px solid #43a047;
      font-weight:bold;
    }

    .upload{
      text-align:center;
      margin-bottom:25px;
    }

    input[type="file"]{
      padding:10px;
      font-size:16px;
    }

    img{
      width:100%;
      max-height:450px;
      object-fit:contain;
      border-radius:16px;
      border:2px solid #ddd;
      background:#fafafa;
      display:none;
      margin-top:20px;
    }

    .result{
      margin-top:25px;
      padding:20px;
      border-radius:14px;
      background:#f7f7f7;
      font-size:20px;
      line-height:1.8;
    }

    .good{
      color:#2e7d32;
      font-weight:bold;
    }

    .warn{
      color:#e65100;
      font-weight:bold;
    }

    .bad{
      color:#c62828;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- BYT TILL DITT NAMN -->
  <h1>Ditt Namn, TE23</h1>

  <div class="status" id="status">
    Laddar modell...
  </div>

  <div class="upload">
    <input type="file" id="imageInput" accept="image/*">
  </div>

  <img id="previewImage">

  <div class="result" id="result">
    Ladda upp en blom-bild för att börja.
  </div>

</div>

<script>

let model;

// ======================================
// VIKTIGT:
// ORDNINGEN MÅSTE MATCHA MODELLEN EXAKT
// ======================================
const classNames = [
  "Lavendel",
  "Maskros",
  "Ros",
  "Solros",
  "Tulpan"
];

const statusBox = document.getElementById("status");
const imageInput = document.getElementById("imageInput");
const previewImage = document.getElementById("previewImage");
const resultBox = document.getElementById("result");

// ======================================
// LADDA MODELL
// ======================================
async function loadModel(){

  try{

    statusBox.innerHTML = "Laddar modell...";

    model = await tf.loadLayersModel(
      "./tfjs_model/model.json"
    );

    statusBox.innerHTML =
      "<span class='good'>Modellen är klar!</span>";

    console.log("Modell laddad");

  }catch(error){

    console.error(error);

    statusBox.innerHTML =
      "<span class='bad'>Kunde inte ladda modellen.</span>";
  }
}

loadModel();

// ======================================
// LADDA BILD
// ======================================
imageInput.addEventListener("change", async (event)=>{

  const file = event.target.files[0];

  if(!file) return;

  const imageURL = URL.createObjectURL(file);

  previewImage.src = imageURL;
  previewImage.style.display = "block";

  previewImage.onload = async ()=>{

    await classifyImage(previewImage);
  };
});

// ======================================
// FÖRBEHANDLA BILD
// ======================================
function preprocessImage(image){

  return tf.tidy(()=>{

    // ==================================
    // VANLIGASTE FELET:
    // Fel storlek eller fel normalisering
    // ==================================

    let tensor = tf.browser.fromPixels(image);

    tensor = tf.image.resizeBilinear(tensor, [224,224]);

    tensor = tensor.toFloat();

    // ==================================
    // MOBILENET-STIL NORMALISERING
    // [-1, 1]
    // ==================================
    tensor = tensor.div(127.5).sub(1);

    tensor = tensor.expandDims(0);

    return tensor;
  });
}

// ======================================
// KONTROLLERA OM MODELLEN REDAN
// ANVÄNDER SOFTMAX
// ======================================
function isProbabilityOutput(arr){

  const sum =
    arr.reduce((a,b)=>a+b,0);

  const allValid =
    arr.every(v => v >= 0 && v <= 1);

  return allValid &&
         sum > 0.9 &&
         sum < 1.1;
}

// ======================================
// EGEN SOFTMAX
// ======================================
function softmax(arr){

  const max = Math.max(...arr);

  const exps =
    arr.map(v => Math.exp(v - max));

  const sum =
    exps.reduce((a,b)=>a+b,0);

  return exps.map(v => v / sum);
}

// ======================================
// KLASSIFICERA BILD
// ======================================
async function classifyImage(image){

  try{

    resultBox.innerHTML = "Analyserar bild...";

    const tensor =
      preprocessImage(image);

    const prediction =
      model.predict(tensor);

    const raw =
      Array.from(await prediction.data());

    console.log("RAW OUTPUT:", raw);

    // ==================================
    // FIX:
    // Om modellen redan ger sannolikheter
    // använd dem direkt.
    // ==================================
    let probabilities;

    if(isProbabilityOutput(raw)){

      probabilities = raw;

      console.log("Modellen använder redan softmax");

    }else{

      probabilities = softmax(raw);

      console.log("Softmax applicerad manuellt");
    }

    console.log("PROBABILITIES:", probabilities);

    // ==================================
    // HITTA BÄSTA RESULTAT
    // ==================================
    let bestIndex = 0;

    for(let i = 1; i < probabilities.length; i++){

      if(probabilities[i] >
         probabilities[bestIndex]){

        bestIndex = i;
      }
    }

    const bestProbability =
      probabilities[bestIndex];

    const flower =
      classNames[bestIndex] || "Okänd";

    const percent =
      (bestProbability * 100).toFixed(2);

    // ==================================
    // OSÄKERHETSLOGIK
    // ==================================
    let confidenceText = "";

    if(bestProbability < 0.5){

      confidenceText =
        "<div class='bad'>Mycket osäkert resultat</div>";

    }else if(bestProbability < 0.75){

      confidenceText =
        "<div class='warn'>Osäkert resultat</div>";

    }else{

      confidenceText =
        "<div class='good'>Hög säkerhet</div>";
    }

    // ==================================
    // VISA RESULTAT
    // ==================================
    resultBox.innerHTML = `
      <strong>Blomart:</strong> ${flower}<br>
      <strong>Sannolikhet:</strong> ${percent}%<br>
      ${confidenceText}
    `;

    // ==================================
    // STÄDA MINNE
    // ==================================
    tf.dispose([
      tensor,
      prediction
    ]);

  }catch(error){

    console.error(error);

    resultBox.innerHTML =
      "<span class='bad'>Fel vid analys av bilden.</span>";
  }
}

</script>

</body>
</html>
